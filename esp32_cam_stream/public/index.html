<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPI Aquaculture — Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      gap: 24px;
    }

    .stream-box {
      border: 2px solid #00d4ff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
      flex-shrink: 0;
    }

    .stream-box img {
      display: block;
      width: 320px;
    }

    .sensors {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      width: 220px;
    }

    .sensor-card {
      background: #111;
      border: 1px solid #00d4ff33;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }

    .sensor-card .label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .sensor-card .value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #00d4ff;
    }

    .sensor-card .unit {
      font-size: 0.85rem;
      color: #444;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="stream-box">
    <img src="/video" alt="Flux caméra ESP32">
  </div>

  <div class="sensors">
    <div class="sensor-card">
      <div class="label">Température</div>
      <div class="value" id="temp">--</div>
      <div class="unit">°C</div>
    </div>
    <div class="sensor-card">
      <div class="label">Humidité</div>
      <div class="value" id="hum">--</div>
      <div class="unit">%</div>
    </div>
    <div class="sensor-card">
      <div class="label">pH</div>
      <div class="value" id="ph">--</div>
      <div class="unit">pH</div>
    </div>
    <div class="sensor-card">
      <div class="label">Turbidité</div>
      <div class="value" id="ntu">--</div>
      <div class="unit">NTU</div>
    </div>
  </div>

  <script>
    async function fetchData() {
      try {
        const res  = await fetch('/data');
        const data = await res.json();
        document.getElementById('temp').textContent = data.temperature ?? '--';
        document.getElementById('hum').textContent  = data.humidity    ?? '--';
        document.getElementById('ph').textContent   = data.ph          ?? '--';
        document.getElementById('ntu').textContent  = data.ntu         ?? '--';
      } catch(e) {}
    }

    fetchData();
    setInterval(fetchData, 2000);
  </script>
</body>
</html>
